#
# arsguard — Squid 配置（HTTP-only 分支）
# 限制：仅允许 HTTP/HTTPS，禁止 CONNECT 隧道的非标准端口
# =============================================================

# 监听端口
http_port 3128

# 日志
access_log /var/log/squid/access.log
cache_log /var/log/squid/cache.log
logfile_rotate 4

# 缓存配置
cache_mem 256 MB
maximum_object_size_in_memory 512 KB

# ACL：定义 OpenClaw 后端
acl openclaw_backend dstdomain openclaw
acl openclaw_backend dst 172.16.0.0/12

# ACL：允许的 HTTP 方法（仅标准 HTTP，不含 CONNECT）
acl allowed_methods method GET POST PUT DELETE PATCH HEAD OPTIONS

# ACL：禁止 WebSocket 升级
acl websocket_upgrade req_header Upgrade WebSocket

# ACL：仅允许标准 HTTPS 端口（443）
acl ssl_ports port 443
acl safe_ports port 80 443 8080

# 安全配置
acl CONNECT method CONNECT
http_access deny CONNECT !ssl_ports
http_access deny to_localhost

# 核心规则：仅允许 HTTP 方法，禁止 WebSocket 升级
http_access deny websocket_upgrade
http_access deny !allowed_methods

# 允许访问 OpenClaw
http_access allow openclaw_backend

# 默认拒绝
http_access deny all

# 转发配置
cache_peer openclaw parent 8080 0 no-query originserver name=openclaw_peer
cache_peer_access openclaw_peer allow openclaw_backend

# 性能优化
quick_abort_min -1 KB
forwarded_for delete
via off
