#
# arsguard — Squid 配置（WebSocket 分支）
# 支持：HTTP + WebSocket 升级
# =============================================================

# 监听端口
http_port 3128

# 日志
access_log /var/log/squid/access.log
cache_log /var/log/squid/cache.log
logfile_rotate 4

# 缓存配置（WebSocket 不缓存）
cache_mem 256 MB
maximum_object_size_in_memory 512 KB

# ACL：定义 OpenClaw 后端
acl openclaw_backend_domain dstdomain openclaw
acl openclaw_backend_subnet dst 172.16.0.0/12

# ACL：允许的 HTTP 方法（包含 CONNECT 用于 WebSocket 隧道）
acl all_methods method GET POST PUT DELETE PATCH HEAD OPTIONS CONNECT

# ACL：WebSocket 升级检测
acl websocket_upgrade req_header Upgrade WebSocket
acl websocket_connection req_header Connection Upgrade

# ACL：安全端口（WebSocket 可能使用非标准端口）
acl ssl_ports port 443
acl safe_ports port 80 443 8080 8000 8443

# 安全配置
acl CONNECT method CONNECT
http_access deny CONNECT !ssl_ports
http_access deny to_localhost

# 核心规则：允许所有方法（含 CONNECT）
http_access allow all_methods

# 允许 WebSocket 升级
http_access allow websocket_upgrade
http_access allow websocket_connection

# 允许访问 OpenClaw
http_access allow openclaw_backend_domain
http_access allow openclaw_backend_subnet

# 默认拒绝
http_access deny all

# 转发配置（支持 WebSocket）
cache_peer openclaw parent 8080 0 no-query originserver name=openclaw_peer
cache_peer_access openclaw_peer allow openclaw_backend_domain
cache_peer_access openclaw_peer allow openclaw_backend_subnet

# WebSocket 支持配置
# 不缓存 WebSocket 连接
cache deny websocket_upgrade

# 性能优化
quick_abort_min -1 KB
forwarded_for delete
via off
